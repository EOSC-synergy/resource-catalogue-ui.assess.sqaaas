config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint_fix
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/madgeek-arc/resource-catalogue-ui:
      branch: master
      repo: https://github.com/madgeek-arc/resource-catalogue-ui
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/madgeek-arc/resource-catalogue-ui git:
        commands:
        - /usr/bin/env sh .sqa/script.flaky-xanthic-quetzal.sh
        container: qc.acc_bumpy-celadon-husky
  QC.Doc:
    repos:
      github.com/madgeek-arc/resource-catalogue-ui find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.seedy-cream-budgerigar.sh
        container: qc.doc_grumpy-burgundy-chameleon
      github.com/madgeek-arc/resource-catalogue-ui git:
        commands:
        - /usr/bin/env sh .sqa/script.lovely-olivine-tarantula.sh
        container: qc.doc_flaky-mauve-hummingbird
      github.com/madgeek-arc/resource-catalogue-ui markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.bluesy-mauve-mole.sh
        container: qc.doc_goopy-alizarin-owl
  QC.Lic:
    repos:
      github.com/madgeek-arc/resource-catalogue-ui licensee:
        commands:
        - /usr/bin/env sh .sqa/script.bumpy-alizarin-lizard.sh
        container: qc.lic_grumpy-copper-tang
  QC.Sty:
    repos:
      github.com/madgeek-arc/resource-catalogue-ui hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.pasty-indigo-ragdoll.sh
        container: qc.sty_tasty-sepia-hyena
      github.com/madgeek-arc/resource-catalogue-ui jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.droopy-pink-cat.sh
        container: qc.sty_scanty-black-opossum
  QC.Ver:
    repos:
      github.com/madgeek-arc/resource-catalogue-ui get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.cozy-amethyst-fowl.sh
        container: qc.ver_smelly-champagne-sparrow
timeout: 5400
